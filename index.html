<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spectra — Real-Time Audio Visualizer</title>

<!-- ============================================================
     THEME & LAYOUT
     A dark "instrument panel" aesthetic: deep blue-black field,
     phosphor-amber accents (vintage VU meter), monospace labels.
     All colors flow from custom properties so the render loop
     can read them later via getComputedStyle if desired.
     ============================================================ -->
<style>
  :root {
    --bg:           #0b0e13;   /* deep blue-black field        */
    --panel:        #11151d;   /* raised surfaces              */
    --line:         #232a36;   /* hairline borders             */
    --text:         #c9d1de;   /* primary text                 */
    --text-dim:     #5c6675;   /* labels, captions             */
    --accent:       #f5a623;   /* phosphor amber (VU needle)   */
    --accent-soft:  rgba(245, 166, 35, 0.12);
    --tip:          #ffe9b8;   /* hottest highlight — theme-set */
    --mono: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  /* Vertical app shell: header / canvas stage / transport bar */
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- Header ---------- */
  header {
    width: 100%;
    max-width: 960px;
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .mode-switch {
    display: flex;
    gap: 2px;
    padding: 2px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
  }

  .mode-switch button {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
  }

  .mode-switch button:hover { color: var(--text); }
  .mode-switch button[aria-pressed="true"] {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .mode-switch button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }

  header h1 .tick { color: var(--accent); }

  #telemetry {
    display: flex;
    gap: 12px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;  /* digits hold position at 60fps */
  }

  /* Fixed min-widths stop the strip from reflowing as values change */
  #tele-peak { min-width: 96px; }
  #tele-db   { min-width: 56px; text-align: right; }
  #telemetry .hot { color: var(--accent); }

  @media (max-width: 720px) {
    #tele-sr, #tele-fft { display: none; }  /* keep live values on small screens */
  }

  /* ---------- Canvas stage ---------- */
  main {
    flex: 1;
    width: 100%;
    max-width: 960px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }

  /* ---------- Control deck ---------- */
  #control-deck {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .deck-field {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #fft-select {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
  }
  #fft-select:focus-visible { outline: 2px solid var(--accent); }

  .theme-swatches {
    display: flex;
    gap: 7px;
    margin-left: auto;          /* push swatches to the right edge */
  }
  .swatch {
    width: 18px;
    height: 18px;
    padding: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--sw);      /* per-button color via inline var */
    cursor: pointer;
    transition: box-shadow 150ms ease;
  }
  .swatch[aria-pressed="true"] {
    border-color: var(--text);
    box-shadow: 0 0 8px var(--sw);
  }
  .swatch:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  #mic-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    transition: color 150ms ease, border-color 150ms ease;
  }
  #mic-btn:hover { color: var(--text); }
  #mic-btn[aria-pressed="true"] {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  #mic-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #mic-btn svg { width: 12px; height: 12px; fill: currentColor; }

  /* File transport is inert while the mic owns the analyser */
  #transport.disabled { opacity: 0.45; pointer-events: none; }

  #stage {
    width: 100%;
    flex: 1;
    min-height: 320px;
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }

  #visualizer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Fullscreen toggle — quiet corner chip, brightens on hover */
  #fs-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 3;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(11, 14, 19, 0.55);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 150ms ease, color 150ms ease, border-color 150ms ease;
  }
  #fs-btn:hover { opacity: 1; color: var(--accent); border-color: var(--accent); }
  #fs-btn:focus-visible { outline: 2px solid var(--accent); opacity: 1; }
  #fs-btn svg { width: 15px; height: 15px; fill: currentColor; }

  /* Icon swap rides the stage's :fullscreen state — no JS class needed */
  #fs-btn .icon-compress { display: none; }
  #stage:fullscreen #fs-btn .icon-expand { display: none; }
  #stage:fullscreen #fs-btn .icon-compress { display: block; }

  /* Frameless in fullscreen: the canvas IS the display */
  #stage:fullscreen {
    border: none;
    border-radius: 0;
    background: var(--bg);
  }

  /* ---------- Drop zone (landing state) ----------
     Overlays the canvas; styled as a "load deck" slot.
     Hidden once a track is loaded. */
  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: background 160ms ease;
    z-index: 2;
  }

  #drop-zone:hover,
  #drop-zone.drag-over {
    background: var(--accent-soft);
  }

  #drop-zone:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  /* The "slot" — a thin amber aperture, like a tape deck mouth */
  .slot {
    width: 180px;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg,
      transparent, var(--accent) 18%, var(--accent) 82%, transparent);
    box-shadow: 0 0 22px rgba(245, 166, 35, 0.35);
    transition: width 200ms ease;
  }

  #drop-zone:hover .slot,
  #drop-zone.drag-over .slot { width: 240px; }

  #drop-zone p {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #drop-zone p strong { color: var(--text); font-weight: 600; }

  #drop-zone.hidden { display: none; }

  /* Real file input stays accessible but visually hidden */
  #file-input {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* ---------- Transport bar ---------- */
  footer {
    width: 100%;
    max-width: 960px;
    padding: 0 24px 28px;
  }

  #transport {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    visibility: hidden;            /* revealed when a track loads */
  }

  #transport.active { visibility: visible; }

  #track-name {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* Square icon buttons (play/pause, mute) */
  .t-btn {
    width: 36px;
    height: 36px;
    flex: none;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--accent);
    cursor: pointer;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  .t-btn:hover { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-soft); }
  .t-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .t-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* Icon swapping via state classes */
  #play-btn .icon-pause,
  #play-btn.playing .icon-play { display: none; }
  #play-btn.playing .icon-pause { display: block; }
  #mute-btn .icon-muted,
  #mute-btn.muted .icon-vol { display: none; }
  #mute-btn.muted .icon-muted { display: block; }

  #time-readout {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--text);
    flex: none;
    min-width: 102px;
    text-align: center;
    font-variant-numeric: tabular-nums;  /* digits don't jitter */
  }

  /* Custom seek bar — div-based for full styling control */
  #seek-bar {
    position: relative;
    flex: 1;
    height: 20px;                 /* generous hit target */
    cursor: pointer;
    touch-action: none;           /* we own the pointer gestures */
  }
  #seek-bar::before {             /* track */
    content: "";
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 5px;
    transform: translateY(-50%);
    background: var(--line);
    border-radius: 3px;
  }
  #seek-fill {
    position: absolute;
    left: 0;
    top: 50%;
    width: 0%;
    height: 5px;
    transform: translateY(-50%);
    border-radius: 3px;
    background: var(--accent);
    pointer-events: none;
  }
  #seek-handle {
    position: absolute;
    left: 0%;
    top: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--tip);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 8px var(--accent);
    opacity: 0;
    transition: opacity 120ms ease;
    pointer-events: none;
  }
  #seek-bar:hover #seek-handle,
  #seek-bar.dragging #seek-handle,
  #seek-bar:focus-visible #seek-handle { opacity: 1; }
  #seek-bar:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* Volume */
  .volume-group { display: flex; align-items: center; gap: 8px; flex: none; }
  #vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 84px;
    height: 5px;
    border-radius: 3px;
    background: var(--line);
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
  }
  #vol-slider::-moz-range-thumb {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
  }
  #vol-slider::-moz-range-progress {
    background: var(--accent);
    height: 5px;
    border-radius: 3px;
  }

  /* Engine only — custom transport owns the UI */
  audio { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .slot, #drop-zone { transition: none; }
  }
</style>
</head>

<body>
  <!-- ============================================================
       SECTION 1 — UI LAYOUT
       ============================================================ -->
  <header>
    <h1><span class="tick">▮</span> Spectra</h1>
    <div id="telemetry">
      <span id="tele-fft">FFT 512</span>
      <span id="tele-sr">SR ——</span>
      <span id="tele-peak">PEAK ——</span>
      <span id="tele-db">−∞ dB</span>
      <span id="tele-state">STANDBY</span>
    </div>
  </header>

  <main>
    <div id="control-deck">
      <nav class="mode-switch" aria-label="Visualization mode">
        <button data-mode="bars"     aria-pressed="true">Bars</button>
        <button data-mode="circular" aria-pressed="false">Radial</button>
        <button data-mode="waveform" aria-pressed="false">Wave</button>
      </nav>

      <label class="deck-field">
        <span>FFT</span>
        <select id="fft-select" aria-label="FFT size">
          <option value="256">256</option>
          <option value="512" selected>512</option>
          <option value="1024">1024</option>
          <option value="2048">2048</option>
        </select>
      </label>

      <button id="mic-btn" aria-pressed="false" title="Use Microphone / Line-In">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 14a3 3 0 003-3V6a3 3 0 10-6 0v5a3 3 0 003 3z"/>
          <path d="M5 11a7 7 0 0014 0h-2a5 5 0 01-10 0H5z"/>
          <path d="M11 17.9h2V21h-2z"/>
        </svg>
        Mic / Line-In
      </button>

      <div class="theme-swatches" role="group" aria-label="Color theme">
        <button class="swatch" data-theme="amber" style="--sw:#f5a623" aria-label="Amber theme"     aria-pressed="true"></button>
        <button class="swatch" data-theme="pink"  style="--sw:#ff2ec4" aria-label="Cyberpunk theme" aria-pressed="false"></button>
        <button class="swatch" data-theme="green" style="--sw:#22e06a" aria-label="Matrix theme"    aria-pressed="false"></button>
        <button class="swatch" data-theme="ice"   style="--sw:#41c7ff" aria-label="Ice theme"       aria-pressed="false"></button>
      </div>
    </div>

    <div id="stage">
      <canvas id="visualizer"></canvas>

      <button id="fs-btn" aria-label="Enter fullscreen" title="Fullscreen">
        <svg class="icon-expand" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9V4h5v2H6v3H4zm11-5h5v5h-2V6h-3V4zM4 15h2v3h3v2H4v-5zm14 0h2v5h-5v-2h3v-3z"/>
        </svg>
        <svg class="icon-compress" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 4v5H4V7h3V4h2zm6 0h2v3h3v2h-5V4zM4 15h5v5H7v-3H4v-2zm11 0h5v2h-3v3h-2v-5z"/>
        </svg>
      </button>

      <div id="drop-zone" role="button" tabindex="0"
           aria-label="Load an MP3 file. Click to browse or drop a file here.">
        <div class="slot" aria-hidden="true"></div>
        <p><strong>Drop an MP3</strong> or click to browse</p>
      </div>

      <input type="file" id="file-input" accept="audio/mpeg,audio/mp3,.mp3" />
    </div>
  </main>

  <footer>
    <div id="transport">
      <span id="track-name">—</span>

      <div class="controls-row">
        <button id="play-btn" class="t-btn" aria-label="Play">
          <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>

        <span id="time-readout">00:00 / 00:00</span>

        <div id="seek-bar" role="slider" tabindex="0" aria-label="Seek position"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="seek-fill"></div>
          <div id="seek-handle"></div>
        </div>

        <div class="volume-group">
          <button id="mute-btn" class="t-btn" aria-label="Mute">
            <svg class="icon-vol" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16 8.6a4.4 4.4 0 010 6.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16 9.5l5 5m0-5l-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume" />
        </div>
      </div>

      <!-- The audio element stays in the graph as the decode/playback
           engine — controls removed, visually hidden, logic intact. -->
      <audio id="audio-el"></audio>
    </div>
  </footer>

<script>
"use strict";

/* ==============================================================
   SECTION 2 — AUDIO ENGINE
   Owns the AudioContext, the AnalyserNode, and the data buffer.
   Nothing here touches the canvas; the render loop only reads
   `analyser` and `freqData`.
   ============================================================== */

let FFT_SIZE = 512;                   // → 256 bins; user-adjustable live

// --- DOM handles -------------------------------------------------
const dropZone   = document.getElementById("drop-zone");
const fileInput  = document.getElementById("file-input");
const audioEl    = document.getElementById("audio-el");
const transport  = document.getElementById("transport");
const trackName  = document.getElementById("track-name");
const teleSr     = document.getElementById("tele-sr");
const telePeak   = document.getElementById("tele-peak");
const teleDb     = document.getElementById("tele-db");
const teleState  = document.getElementById("tele-state");
const canvas     = document.getElementById("visualizer");
const ctx2d      = canvas.getContext("2d");

// --- Audio graph state (populated lazily) ------------------------
let audioCtx   = null;  // AudioContext — created on first user gesture
let analyser   = null;  // AnalyserNode — FFT provider for BOTH sources
let fileSource = null;  // MediaElementAudioSourceNode (one per element, EVER)
let freqData   = null;  // Uint8Array(frequencyBinCount) — frequency domain
let timeData   = null;  // Uint8Array(fftSize) — raw time-domain samples
let graphWired = false; // createMediaElementSource may run only ONCE per element
let binHz      = 0;     // Hz per FFT bin = sampleRate / fftSize

// Mic input state
let inputMode  = "file";  // 'file' | 'mic'
let micStream  = null;    // MediaStream — tracks stopped on exit
let micSource  = null;    // MediaStreamAudioSourceNode

/**
 * Create (or resume) the AudioContext.
 * MUST be called from inside a user-gesture handler: browsers
 * autoplay-block contexts created outside one. We also call
 * resume() defensively — Safari in particular hands back a
 * context in the "suspended" state.
 */
async function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }
  return audioCtx;
}

/**
 * Wire: <audio> → AnalyserNode → destination (speakers).
 * Idempotent — the source node can only ever be created once
 * per media element, so we guard with `graphWired`.
 */
/**
 * Create the AnalyserNode + data buffers if they don't exist yet.
 * Source-agnostic: both the file path and the mic path call this,
 * so whichever input the user reaches for FIRST builds the analyser.
 */
async function ensureAnalyser() {
  const ctx = await getAudioContext();
  if (!analyser) {
    analyser = ctx.createAnalyser();
    analyser.fftSize = FFT_SIZE;            // honors the dropdown value
    analyser.smoothingTimeConstant = 0.85;  // silky inter-frame easing

    // Reusable buffers — allocated here, filled in place every frame.
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);

    // System telemetry: actual hardware rate + frequency resolution
    binHz = ctx.sampleRate / FFT_SIZE;      // e.g. 48000/512 ≈ 93.8 Hz
    teleSr.textContent = `SR ${ctx.sampleRate} Hz`;
  }
  return ctx;
}

/**
 * Wire the FILE path: <audio> → analyser → destination (speakers).
 * Idempotent — the media element source can only ever be created
 * once per element, so we guard with `graphWired`.
 */
async function wireAudioGraph() {
  const ctx = await ensureAnalyser();
  if (graphWired) return;

  fileSource = ctx.createMediaElementSource(audioEl);
  fileSource.connect(analyser);
  analyser.connect(ctx.destination);
  graphWired = true;
}

/**
 * Accept a File, validate it's audio, and hand it to the
 * <audio> element via an object URL.
 */
async function loadTrack(file) {
  if (!file) return;
  if (!file.type.startsWith("audio/") && !/\.mp3$/i.test(file.name)) {
    teleState.textContent = "BAD FILE";
    return;
  }

  // A new file implicitly means "back to file mode"
  if (inputMode === "mic") disableMic();

  await wireAudioGraph();   // safe: we're inside a user gesture

  // Revoke the previous object URL to avoid leaking blobs.
  if (audioEl.dataset.objectUrl) URL.revokeObjectURL(audioEl.dataset.objectUrl);
  const url = URL.createObjectURL(file);
  audioEl.dataset.objectUrl = url;
  audioEl.src = url;
  audioEl.play().catch(() => { /* user can press play manually */ });

  // UI state: landing → playing
  trackName.textContent = file.name;
  transport.classList.add("active");
  dropZone.classList.add("hidden");
  teleState.textContent = "LIVE";
  teleState.classList.add("hot");

  startRenderLoop();
}

// --- Upload event wiring ------------------------------------------

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    fileInput.click();
  }
});

fileInput.addEventListener("change", () => loadTrack(fileInput.files[0]));

// Drag & drop — preventDefault on dragover is required, otherwise
// the browser navigates to the dropped file.
dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("drag-over");
});
dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-over");
});
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  loadTrack(e.dataTransfer.files[0]);
});

// --- Microphone / Line-In input -------------------------------------
const micBtn = document.getElementById("mic-btn");

/**
 * Route: mic → analyser → (NOTHING).
 *
 * The one rule that matters here: the mic must NEVER reach
 * ctx.destination, or speakers feed the mic feeds the speakers —
 * an instant feedback howl. So entering mic mode disconnects the
 * analyser's output entirely; it keeps producing FFT data with no
 * downstream connection at all (a visual-only tap).
 */
async function enableMic() {
  const ctx = await ensureAnalyser();   // mic can be the FIRST source

  // Ask for the RAW signal: the browser's voice-call DSP (echo
  // cancellation, auto-gain, noise suppression) actively distorts
  // the spectrum we're trying to display — music through AGC
  // "breathes", suppressed noise floors flatten real harmonics.
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl:  false,
    },
  });

  // Detach the file path: silence playback, unplug both hops
  audioEl.pause();
  if (graphWired) {
    fileSource.disconnect();   // file → analyser severed
    analyser.disconnect();     // analyser → speakers severed (anti-feedback)
  }

  micStream = stream;
  micSource = ctx.createMediaStreamSource(stream);
  micSource.connect(analyser);

  inputMode = "mic";
  micBtn.setAttribute("aria-pressed", "true");
  teleState.textContent = "MIC LIVE";
  teleState.classList.add("hot");
  dropZone.classList.add("hidden");
  transport.classList.add("disabled");
}

/**
 * Back to file mode: stop the hardware (kills the browser's
 * recording indicator), then restore the file routing exactly
 * as wireAudioGraph() originally built it.
 */
function disableMic() {
  if (micSource) { micSource.disconnect(); micSource = null; }
  if (micStream) {
    micStream.getTracks().forEach((t) => t.stop());  // releases the device
    micStream = null;
  }

  if (graphWired) {
    fileSource.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  inputMode = "file";
  micBtn.setAttribute("aria-pressed", "false");
  transport.classList.remove("disabled");

  if (audioEl.src) {
    teleState.textContent = "LIVE";    // track stays paused; user resumes
  } else {
    teleState.textContent = "STANDBY";
    teleState.classList.remove("hot");
    dropZone.classList.remove("hidden");
  }
}

micBtn.addEventListener("click", async () => {
  if (inputMode === "mic") { disableMic(); return; }
  try {
    await enableMic();
  } catch (err) {
    // Permission denied or no device — leave file mode untouched
    teleState.textContent = "MIC DENIED";
    teleState.classList.remove("hot");
  }
});

// --- Fullscreen ------------------------------------------------------
// Targets the STAGE (canvas wrapper), not the canvas itself: a
// fullscreened <canvas> can't host the overlay button or drop zone.
// Canvas resolution needs NO special handling here — the render
// loop's resizeCanvasToDisplaySize() re-syncs the bitmap to the new
// bounding box × devicePixelRatio on the very next frame, so the
// graphics scale crisply instead of stretching.
const fsBtn = document.getElementById("fs-btn");
const stage = document.getElementById("stage");

fsBtn.addEventListener("click", async () => {
  try {
    if (document.fullscreenElement) {
      await document.exitFullscreen();
    } else if (stage.requestFullscreen) {
      await stage.requestFullscreen();
    } else if (stage.webkitRequestFullscreen) {
      stage.webkitRequestFullscreen();         // older Safari
    }
  } catch (err) {
    /* request denied (e.g. iframe without allowfullscreen) — ignore */
  }
});

// Keep the accessible label truthful; the icon swap is pure CSS
// via the :fullscreen pseudo-class.
document.addEventListener("fullscreenchange", () => {
  fsBtn.setAttribute("aria-label",
    document.fullscreenElement ? "Exit fullscreen" : "Enter fullscreen");
});


/* ==============================================================
   SECTION 3 — TRANSPORT UI
   The hidden <audio> element remains the playback engine; these
   controls are a thin view layer over its state. Per-frame
   position sync happens in updateTransportUI(), called from the
   render loop with change-guards so the DOM is only touched when
   a value actually moves.
   ============================================================== */

const playBtn    = document.getElementById("play-btn");
const muteBtn    = document.getElementById("mute-btn");
const volSlider  = document.getElementById("vol-slider");
const seekBar    = document.getElementById("seek-bar");
const seekFill   = document.getElementById("seek-fill");
const seekHandle = document.getElementById("seek-handle");
const timeEl     = document.getElementById("time-readout");

/** Seconds → "MM:SS". NaN/Infinity (no metadata yet) renders 00:00. */
function fmtTime(s) {
  if (!Number.isFinite(s) || s < 0) s = 0;
  const m   = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

// --- Play / pause -------------------------------------------------
async function togglePlay() {
  if (!audioEl.src) return;
  // Defensive resume — some browsers re-suspend on tab switch
  if (audioCtx && audioCtx.state === "suspended") await audioCtx.resume();
  if (audioEl.paused) audioEl.play(); else audioEl.pause();
}
playBtn.addEventListener("click", togglePlay);

// Button state mirrors the ELEMENT's events, not our click handler —
// so spacebar shortcuts, track end, etc. all stay in sync for free.
audioEl.addEventListener("play", () => {
  playBtn.classList.add("playing");
  playBtn.setAttribute("aria-label", "Pause");
});
audioEl.addEventListener("pause", () => {
  playBtn.classList.remove("playing");
  playBtn.setAttribute("aria-label", "Play");
});

// --- Seek bar (pointer-driven, drag-capable) -----------------------
let seekDragging = false;

function seekToPointer(e) {
  const rect  = seekBar.getBoundingClientRect();
  const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  if (Number.isFinite(audioEl.duration)) {
    audioEl.currentTime = ratio * audioEl.duration;
  }
}
seekBar.addEventListener("pointerdown", (e) => {
  seekDragging = true;
  seekBar.classList.add("dragging");
  seekBar.setPointerCapture(e.pointerId);  // drag keeps working off-bar
  seekToPointer(e);
});
seekBar.addEventListener("pointermove", (e) => {
  if (seekDragging) seekToPointer(e);
});
seekBar.addEventListener("pointerup", () => {
  seekDragging = false;
  seekBar.classList.remove("dragging");
});

// Keyboard support: ←/→ scrub 5s, Home/End jump
seekBar.addEventListener("keydown", (e) => {
  if (!Number.isFinite(audioEl.duration)) return;
  if      (e.key === "ArrowRight") audioEl.currentTime = Math.min(audioEl.duration, audioEl.currentTime + 5);
  else if (e.key === "ArrowLeft")  audioEl.currentTime = Math.max(0, audioEl.currentTime - 5);
  else if (e.key === "Home")       audioEl.currentTime = 0;
  else if (e.key === "End")        audioEl.currentTime = audioEl.duration;
  else return;
  e.preventDefault();
});

// --- Volume / mute --------------------------------------------------
volSlider.addEventListener("input", () => {
  audioEl.volume = parseFloat(volSlider.value);
  audioEl.muted  = false;
  muteBtn.classList.remove("muted");
  muteBtn.setAttribute("aria-label", "Mute");
});
muteBtn.addEventListener("click", () => {
  audioEl.muted = !audioEl.muted;
  muteBtn.classList.toggle("muted", audioEl.muted);
  muteBtn.setAttribute("aria-label", audioEl.muted ? "Unmute" : "Mute");
});

// --- Per-frame sync (called from the render loop) -------------------
// Change-guards: writing identical values to the DOM 60×/s still
// costs style recalc, so we cache and compare first.
let lastTimeStr = "";
let lastPct     = -1;

function updateTransportUI() {
  const dur = audioEl.duration;
  const cur = audioEl.currentTime || 0;

  const str = fmtTime(cur) + " / " + fmtTime(dur);
  if (str !== lastTimeStr) {
    timeEl.textContent = str;
    lastTimeStr = str;
  }

  const pct = Number.isFinite(dur) && dur > 0 ? (cur / dur) * 100 : 0;
  if (Math.abs(pct - lastPct) > 0.05) {
    seekFill.style.width   = pct + "%";
    seekHandle.style.left  = pct + "%";
    seekBar.setAttribute("aria-valuenow", String(Math.round(pct)));
    lastPct = pct;
  }
}

// --- Live audio telemetry (peak frequency + level) -------------------
let lastPeakStr = "";
let lastDbStr   = "";

/** Write a telemetry field only if its rounded value changed. */
function setTele(el, str, cacheKey) {
  if (cacheKey === "peak" && str !== lastPeakStr) { el.textContent = str; lastPeakStr = str; }
  if (cacheKey === "db"   && str !== lastDbStr)   { el.textContent = str; lastDbStr   = str; }
}

/**
 * Called every frame right after getByteFrequencyData().
 * ONE combined pass over the array finds both the dominant bin
 * (max scan) and the mean level (sum) — no second iteration.
 *
 *   dominant Hz = maxIndex · (sampleRate / fftSize)
 *   level dB    = 20·log₁₀(mean / 255)      (0 dB = full scale)
 */
function updateTelemetry() {
  let maxV = 0, maxI = 0, sum = 0;
  for (let i = 0; i < freqData.length; i++) {
    const v = freqData[i];
    sum += v;
    if (v > maxV) { maxV = v; maxI = i; }
  }

  // Dominant frequency — bin index × frequency resolution
  setTele(telePeak,
    maxV > 0 ? "PEAK " + Math.round(maxI * binHz) + " Hz" : "PEAK ——",
    "peak");

  // Approximate level in dBFS from the mean magnitude. Rounding to
  // whole dB keeps the string stable → most frames skip the DOM write.
  const avg = sum / freqData.length / 255;
  setTele(teleDb,
    avg > 0.0005 ? Math.round(20 * Math.log10(avg)) + " dB" : "−∞ dB",
    "db");
}

/** Idle/paused: park the live fields. */
function resetTelemetry() {
  setTele(telePeak, "PEAK ——", "peak");
  setTele(teleDb, "−∞ dB", "db");
}


/* ==============================================================
   SECTION 4 — RENDER LOOP
   Per frame: clear canvas → pull live FFT data into the reused
   Uint8Array → indexed for-loop → one bar per rendered bin.
   No allocations inside the loop; gradient is rebuilt only when
   the canvas height actually changes.
   ============================================================== */

let rafId = null;

// --- Render tuning ------------------------------------------------
const BAR_GAP = 2;       // px gap between bars (CSS pixels)
const HF_TILT = 1.6;     // high-frequency compensation strength
let CAP_COLOR = "#ffe9b8";   // hottest tip color — set by applyTheme()

const reducedMotion =
  window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* --- Gradient strip (offscreen) -------------------------------------
   Creating ~180 LinearGradients per frame would hammer the GC, so
   the theme's color ramp is rendered onto a 1×256 offscreen canvas —
   repainted ONLY on theme change, never per frame. Each bar is drawn
   with drawImage(), stretching the strip to that bar's height. */
const gradStrip = document.createElement("canvas");
gradStrip.width  = 1;
gradStrip.height = 256;

/** (Re)paint the strip with a 4-stop ramp; called by applyTheme(). */
function paintGradStrip(stops) {
  const g = gradStrip.getContext("2d");
  g.clearRect(0, 0, 1, 256);
  const ramp = g.createLinearGradient(0, 256, 0, 0);
  ramp.addColorStop(0.00, stops[0]);   // deep base
  ramp.addColorStop(0.50, stops[1]);   // primary accent
  ramp.addColorStop(0.85, stops[2]);   // bright
  ramp.addColorStop(1.00, stops[3]);   // luminous tip
  g.fillStyle = ramp;
  g.fillRect(0, 0, 1, 256);
}

/* --- Visual upgrade tuning ----------------------------------------
   Peak-hold physics is frame-based (tuned for ~60fps displays). */
const PEAK_HOLD_FRAMES = 18;     // suspension time before falling
const PEAK_GRAVITY     = 0.32;   // px/frame² downward acceleration
const PEAK_THICKNESS   = 2;      // cap line height in px
const GLOW_THRESHOLD   = 200;    // raw byte value that triggers bloom
const GLOW_BLUR        = 15;     // ctx.shadowBlur radius
let GLOW_COLOR         = "#f5a623";   // set by applyTheme()
const REFL_SCALE       = 0.55;   // reflection is vertically squashed
const REFL_ALPHA       = 0.15;   // glossy-surface opacity
const BASELINE_RATIO   = 0.74;   // bars sit at 74% height; mirror below

/* Peak-hold state — one slot per rendered bin, allocated ONCE.
   peakY[i]    = current cap height above the baseline (px)
   peakVel[i]  = current fall velocity (px/frame)
   peakHold[i] = frames remaining before gravity kicks in
   barHs[i]    = this frame's bar heights, reused by the mirror pass */
/* Per-bin render state. Sizes depend on the active FFT size, so
   everything lives behind allocRenderState() — called once at boot
   and again whenever the FFT dropdown changes. This is the ONLY
   allocation site; the hot loop itself never allocates. */
let binsRendered = 0;
let peakY, peakVel, peakHold, barHs;   // peak-hold physics + mirror cache
let angCos, angSin;                    // radial-mode trig tables

function allocRenderState(binCount) {
  // Render ~70% of bins — crops the near-silent top of the spectrum
  // at every FFT size (180 of 256, 720 of 1024, etc.)
  binsRendered = Math.max(32, Math.floor(binCount * 0.703));

  peakY    = new Float32Array(binsRendered);
  peakVel  = new Float32Array(binsRendered);
  peakHold = new Float32Array(binsRendered);
  barHs    = new Float32Array(binsRendered);

  // θᵢ = (i/n)·2π − π/2 — fixed per bin count, so precomputed here
  angCos = new Float32Array(binsRendered);
  angSin = new Float32Array(binsRendered);
  for (let i = 0; i < binsRendered; i++) {
    const theta = (i / binsRendered) * Math.PI * 2 - Math.PI / 2;
    angCos[i] = Math.cos(theta);
    angSin[i] = Math.sin(theta);
  }
}
allocRenderState(FFT_SIZE / 2);

/* --- Visualization modes -------------------------------------------
   'bars' | 'circular' | 'waveform' — dispatched inside animate(). */
let currentMode = "bars";

// Mode switch wiring — aria-pressed doubles as the style hook
const modeButtons = document.querySelectorAll(".mode-switch button");
modeButtons.forEach((btn) => {
  btn.addEventListener("click", () => {
    currentMode = btn.dataset.mode;
    modeButtons.forEach((b) =>
      b.setAttribute("aria-pressed", String(b === btn)));
  });
});

/* --- FFT size adjuster ----------------------------------------------
   analyser.fftSize is mutable at runtime — the next
   getByteFrequencyData() call simply returns the new bin count.
   The data buffers and per-bin state must be resized to match. */
function setFftSize(size) {
  FFT_SIZE = size;
  allocRenderState(size / 2);
  if (analyser) {
    analyser.fftSize = size;     // live retune, no graph rebuild
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
    binHz    = audioCtx.sampleRate / size;
  }
  document.getElementById("tele-fft").textContent = "FFT " + size;
}
document.getElementById("fft-select").addEventListener("change", (e) => {
  setFftSize(parseInt(e.target.value, 10));
});

/* --- Color themes ----------------------------------------------------
   Each theme owns: the CSS accent vars (UI chrome) and the canvas
   colors (gradient ramp, glow, tips). applyTheme() updates both
   worlds so the whole app pivots in one call. */
const THEMES = {
  amber: { accent: "#f5a623", soft: "rgba(245,166,35,0.12)", tip: "#ffe9b8",
           ramp: ["#6e3f0a", "#f5a623", "#ffb84d", "#ffe9b8"] },
  pink:  { accent: "#ff2ec4", soft: "rgba(255,46,196,0.14)", tip: "#ffd1f1",
           ramp: ["#36063f", "#8b2fd6", "#ff2ec4", "#ffd1f1"] },
  green: { accent: "#22e06a", soft: "rgba(34,224,106,0.12)", tip: "#d2ffe0",
           ramp: ["#04300f", "#0f9d3e", "#22e06a", "#d2ffe0"] },
  ice:   { accent: "#41c7ff", soft: "rgba(65,199,255,0.12)", tip: "#dcf4ff",
           ramp: ["#0a2c47", "#1f7fd1", "#41c7ff", "#dcf4ff"] },
};

function applyTheme(name) {
  const t    = THEMES[name];
  const root = document.documentElement.style;
  root.setProperty("--accent", t.accent);        // UI chrome
  root.setProperty("--accent-soft", t.soft);
  root.setProperty("--tip", t.tip);
  CAP_COLOR  = t.tip;                            // canvas world
  GLOW_COLOR = t.accent;
  paintGradStrip(t.ramp);
  document.querySelectorAll(".theme-swatches .swatch").forEach((s) =>
    s.setAttribute("aria-pressed", String(s.dataset.theme === name)));
}

document.querySelectorAll(".theme-swatches .swatch").forEach((s) =>
  s.addEventListener("click", () => applyTheme(s.dataset.theme)));

applyTheme("amber");   // boot theme — also performs the first strip paint

/** Match the canvas bitmap to its CSS box (DPR-aware). */
function resizeCanvasToDisplaySize() {
  const dpr = window.devicePixelRatio || 1;
  const { clientWidth: w, clientHeight: h } = canvas;
  if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels
  }
}

/**
 * Main render loop — runs once per display frame.
 * Hot path rules: no allocations, no per-frame gradient creation,
 * indexed for-loop over the reused Uint8Array.
 */
function animate() {
  rafId = requestAnimationFrame(animate);
  resizeCanvasToDisplaySize();
  updateTransportUI();   // seek fill + time readout, change-guarded

  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  // 1. CLEAR
  ctx2d.clearRect(0, 0, w, h);

  // Idle only when there's no analyser, or the FILE is paused while
  // in file mode — mic mode renders live regardless of the <audio>.
  if (!analyser || (inputMode === "file" && audioEl.paused)) {
    if (analyser) resetTelemetry();
    drawIdle(w, h);
    return;
  }

  // 2. READ — frequency data feeds telemetry in EVERY mode; the
  // waveform mode additionally pulls raw time-domain samples for
  // its trace. Both reads fill preallocated buffers in place.
  analyser.getByteFrequencyData(freqData);
  updateTelemetry();

  if (currentMode === "circular") {
    drawCircular(w, h);
    return;
  }
  if (currentMode === "waveform") {
    analyser.getByteTimeDomainData(timeData);   // TIME domain
    drawWaveform(w, h);
    return;
  }

  // Default mode: linear bars (frequency domain)

  // 3. ITERATE + 4. DRAW
  const n       = Math.min(binsRendered, freqData.length);
  const baseY   = Math.round(h * BASELINE_RATIO);  // bars stand here
  const slotW   = w / n;                           // bar + gap
  const barW    = Math.max(1, slotW - BAR_GAP);
  const usableH = baseY - 10;                      // headroom at top
  const capR    = barW / 2;

  /* ---- PASS 1: bars + glow + peak-hold caps ---- */
  for (let i = 0; i < n; i++) {
    const raw = freqData[i];
    const v   = raw / 255;                         // normalize 0..1

    // Quadratic high-frequency tilt (see Step 2 notes)
    const t    = i / (n - 1);
    const comp = 1 + HF_TILT * t * t;
    const barH = Math.min(usableH, Math.max(2, v * v * comp * usableH));
    barHs[i]   = barH;                             // reused by mirror pass

    const x = i * slotW + BAR_GAP / 2;
    const y = baseY - barH;

    // GLOW: bloom only behind genuinely hot bins. Shadow rendering
    // is expensive, so it's gated on the raw byte value and reset
    // immediately after — short bars never pay for it.
    const hot = raw > GLOW_THRESHOLD;
    if (hot) {
      ctx2d.shadowBlur  = GLOW_BLUR;
      ctx2d.shadowColor = GLOW_COLOR;
    }

    // Bar body: gradient strip stretched to this bar's height
    ctx2d.drawImage(gradStrip, x, y, barW, barH);

    // Rounded dome at the bar tip
    if (barH > capR + 3) {
      ctx2d.fillStyle = CAP_COLOR;
      ctx2d.beginPath();
      ctx2d.arc(x + capR, y, capR, Math.PI, 0);
      ctx2d.fill();
    }

    if (hot) ctx2d.shadowBlur = 0;                 // glow off ASAP

    // PEAK-HOLD physics: instant push up, suspended hold, then
    // gravity-accelerated fall until it lands on the bar below.
    if (barH >= peakY[i]) {
      peakY[i]    = barH;                          // shoved up instantly
      peakVel[i]  = 0;
      peakHold[i] = PEAK_HOLD_FRAMES;              // re-arm suspension
    } else if (peakHold[i] > 0) {
      peakHold[i]--;                               // hang in the air
    } else {
      peakVel[i] += PEAK_GRAVITY;                  // free fall
      peakY[i]    = Math.max(barH, peakY[i] - peakVel[i]);
    }

    // Cap line: floats PEAK_THICKNESS above its recorded height
    ctx2d.fillStyle = CAP_COLOR;
    ctx2d.fillRect(x, baseY - peakY[i] - PEAK_THICKNESS - 2,
                   barW, PEAK_THICKNESS);
  }

  /* ---- PASS 2: mirrored reflection ----
     Mirror about the baseline with a vertical squash: a point at
     height y above baseY lands REFL_SCALE·y below it. One transform
     wraps the whole pass; bar heights are replayed from barHs with
     no recompute. Glow and caps are deliberately excluded — real
     glossy surfaces reflect mass, not light bloom. */
  ctx2d.save();
  ctx2d.translate(0, baseY);
  ctx2d.scale(1, -REFL_SCALE);
  ctx2d.translate(0, -baseY);
  ctx2d.globalAlpha = REFL_ALPHA;
  for (let i = 0; i < n; i++) {
    const barH = barHs[i];
    const x    = i * slotW + BAR_GAP / 2;
    ctx2d.drawImage(gradStrip, x, baseY - barH, barW, barH);
  }
  ctx2d.restore();

  // Hairline seam where the "glass" meets the bars
  ctx2d.globalAlpha = 0.5;
  ctx2d.fillStyle = "#232a36";
  ctx2d.fillRect(0, baseY, w, 1);
  ctx2d.globalAlpha = 1;
}

/**
 * CIRCULAR / RADIAL MODE — frequency bins as a pulsing sunburst.
 *
 * Geometry per bin i (cos/sin from the precomputed tables):
 *   θᵢ      = (i / n)·2π − π/2
 *   lenᵢ    = v²·comp·maxLen        (same perceptual + HF-tilt curves)
 *   innerᵢ  = (cx + cosθᵢ·r₀,        cy + sinθᵢ·r₀)
 *   outerᵢ  = (cx + cosθᵢ·(r₀+lenᵢ), cy + sinθᵢ·(r₀+lenᵢ))
 *
 * All 180 spokes are accumulated into ONE path and stroked once —
 * a single GPU stroke call instead of 180.
 */
function drawCircular(w, h) {
  const n   = Math.min(binsRendered, freqData.length);
  const cx  = w / 2;
  const cy  = h / 2;
  const dim = Math.min(w, h);

  // Bass pulse: mean of the lowest 8 bins drives the ring radius,
  // so the whole sunburst breathes with the kick drum.
  let bass = 0;
  for (let i = 0; i < 8; i++) bass += freqData[i];
  bass /= 8 * 255;                                   // normalize 0..1
  const r0     = dim * 0.16 + bass * dim * 0.035;    // breathing radius
  const maxLen = dim * 0.30;                         // spoke headroom

  // Spoke width fills the inner circumference minus a small gap
  const spokeW = Math.max(1.5, (2 * Math.PI * r0) / n - 1.5);

  ctx2d.beginPath();
  for (let i = 0; i < n; i++) {
    const v    = freqData[i] / 255;
    const t    = i / (n - 1);
    const comp = 1 + HF_TILT * t * t;
    const len  = Math.max(2, v * v * comp * maxLen);
    const r1   = r0 + len;
    ctx2d.moveTo(cx + angCos[i] * r0, cy + angSin[i] * r0);
    ctx2d.lineTo(cx + angCos[i] * r1, cy + angSin[i] * r1);
  }
  ctx2d.lineWidth   = spokeW;
  ctx2d.lineCap     = "round";
  ctx2d.strokeStyle = GLOW_COLOR;
  ctx2d.stroke();

  // Inner ring — opacity rides the bass for a heartbeat glow
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, Math.max(4, r0 - 7), 0, Math.PI * 2);
  ctx2d.lineWidth   = 1.5;
  ctx2d.strokeStyle = CAP_COLOR;
  ctx2d.globalAlpha = 0.3 + bass * 0.7;
  ctx2d.stroke();
  ctx2d.globalAlpha = 1;
}

/**
 * WAVEFORM MODE — time-domain oscilloscope trace.
 *
 * getByteTimeDomainData fills timeData with RAW SAMPLE AMPLITUDES,
 * not frequency magnitudes: 128 is the zero crossing (silence),
 * 0 and 255 are the extremes. Mapping per sample k:
 *   x = k · w/(len−1)
 *   y = cy + (v/128 − 1)·A          A = 0.38·h (vertical gain)
 *
 * One continuous polyline, one stroke. The neon glow is a single
 * shadow pass — shadows cost per-STROKE, not per-point, so one
 * 512-point line glows for the price of one rectangle.
 */
function drawWaveform(w, h) {
  const len  = timeData.length;                // 512 samples
  const cy   = h / 2;
  const amp  = h * 0.38;
  const step = w / (len - 1);

  // Graticule: faint center reference line, drawn first (behind)
  ctx2d.globalAlpha = 0.15;
  ctx2d.fillStyle   = "#5c6675";
  ctx2d.fillRect(0, cy, w, 1);
  ctx2d.globalAlpha = 1;

  ctx2d.beginPath();
  ctx2d.moveTo(0, cy + (timeData[0] / 128 - 1) * amp);
  for (let k = 1; k < len; k++) {
    ctx2d.lineTo(k * step, cy + (timeData[k] / 128 - 1) * amp);
  }
  ctx2d.lineWidth   = 2;
  ctx2d.lineJoin    = "round";
  ctx2d.strokeStyle = CAP_COLOR;
  ctx2d.shadowBlur  = 12;
  ctx2d.shadowColor = GLOW_COLOR;
  ctx2d.stroke();
  ctx2d.shadowBlur  = 0;
}

/**
 * Idle state — a slow-breathing wave of ghost bars so the panel
 * reads "powered on, waiting" before a file loads or while paused.
 * Falls back to a static baseline under prefers-reduced-motion.
 */
function drawIdle(w, h) {
  if (reducedMotion) {
    ctx2d.globalAlpha = 0.45;
    ctx2d.drawImage(gradStrip, 0, h - 3, w, 3);
    ctx2d.globalAlpha = 1;
    return;
  }

  const time  = performance.now() / 1000;
  const n     = 96;
  const slotW = w / n;
  const barW  = Math.max(1, slotW - BAR_GAP);
  const baseY = Math.round(h * BASELINE_RATIO);  // same shelf as playback

  ctx2d.globalAlpha = 0.4;
  for (let i = 0; i < n; i++) {
    // Two slow sines at different rates → drifting interference wave
    const phase = (i / n) * Math.PI * 3;
    const swell = Math.sin(phase + time * 0.9) * Math.sin(time * 0.35 + i * 0.07);
    const barH  = 4 + 7 * (0.5 + 0.5 * swell);
    const x     = i * slotW + BAR_GAP / 2;
    ctx2d.drawImage(gradStrip, x, baseY - barH, barW, barH);
  }
  ctx2d.globalAlpha = 1;
}

/** Start the loop exactly once. */
function startRenderLoop() {
  if (rafId === null) animate();
}

window.addEventListener("resize", resizeCanvasToDisplaySize);

// Boot the loop immediately: the idle wave greets the user before
// any file is loaded. (No AudioContext is touched here — that still
// waits for a user gesture.)
startRenderLoop();
</script>
</body>
