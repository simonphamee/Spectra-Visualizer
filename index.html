<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spectra — Real-Time Audio Visualizer</title>

<!-- ============================================================
     THEME & LAYOUT
     A dark "instrument panel" aesthetic: deep blue-black field,
     phosphor-amber accents (vintage VU meter), monospace labels.
     All colors flow from custom properties so the render loop
     can read them later via getComputedStyle if desired.
     ============================================================ -->
<style>
  :root {
    --bg:           #0b0e13;   /* deep blue-black field        */
    --panel:        #11151d;   /* raised surfaces              */
    --line:         #232a36;   /* hairline borders             */
    --text:         #c9d1de;   /* primary text                 */
    --text-dim:     #5c6675;   /* labels, captions             */
    --accent:       #f5a623;   /* phosphor amber (VU needle)   */
    --accent-soft:  rgba(245, 166, 35, 0.12);
    --mono: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  /* Vertical app shell: header / canvas stage / transport bar */
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- Header ---------- */
  header {
    width: 100%;
    max-width: 960px;
    padding: 28px 24px 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }

  header h1 .tick { color: var(--accent); }

  #status-readout {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  /* ---------- Canvas stage ---------- */
  main {
    flex: 1;
    width: 100%;
    max-width: 960px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #stage {
    width: 100%;
    height: 100%;
    min-height: 320px;
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }

  #visualizer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---------- Drop zone (landing state) ----------
     Overlays the canvas; styled as a "load deck" slot.
     Hidden once a track is loaded. */
  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: background 160ms ease;
    z-index: 2;
  }

  #drop-zone:hover,
  #drop-zone.drag-over {
    background: var(--accent-soft);
  }

  #drop-zone:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  /* The "slot" — a thin amber aperture, like a tape deck mouth */
  .slot {
    width: 180px;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg,
      transparent, var(--accent) 18%, var(--accent) 82%, transparent);
    box-shadow: 0 0 22px rgba(245, 166, 35, 0.35);
    transition: width 200ms ease;
  }

  #drop-zone:hover .slot,
  #drop-zone.drag-over .slot { width: 240px; }

  #drop-zone p {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #drop-zone p strong { color: var(--text); font-weight: 600; }

  #drop-zone.hidden { display: none; }

  /* Real file input stays accessible but visually hidden */
  #file-input {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* ---------- Transport bar ---------- */
  footer {
    width: 100%;
    max-width: 960px;
    padding: 0 24px 28px;
  }

  #transport {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    visibility: hidden;            /* revealed when a track loads */
  }

  #transport.active { visibility: visible; }

  #track-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  /* Native controls for Step 1; custom transport comes later */
  audio { height: 32px; }

  @media (prefers-reduced-motion: reduce) {
    .slot, #drop-zone { transition: none; }
  }
</style>
</head>

<body>
  <!-- ============================================================
       SECTION 1 — UI LAYOUT
       ============================================================ -->
  <header>
    <h1><span class="tick">▮</span> Spectra</h1>
    <span id="status-readout">FFT 512 · STANDBY</span>
  </header>

  <main>
    <div id="stage">
      <canvas id="visualizer"></canvas>

      <div id="drop-zone" role="button" tabindex="0"
           aria-label="Load an MP3 file. Click to browse or drop a file here.">
        <div class="slot" aria-hidden="true"></div>
        <p><strong>Drop an MP3</strong> or click to browse</p>
      </div>

      <input type="file" id="file-input" accept="audio/mpeg,audio/mp3,.mp3" />
    </div>
  </main>

  <footer>
    <div id="transport">
      <span id="track-name">—</span>
      <!-- Native controls used as the audio element + graph source.
           crossorigin not needed: object URLs are same-origin. -->
      <audio id="audio-el" controls></audio>
    </div>
  </footer>

<script>
"use strict";

/* ==============================================================
   SECTION 2 — AUDIO ENGINE
   Owns the AudioContext, the AnalyserNode, and the data buffer.
   Nothing here touches the canvas; the render loop only reads
   `analyser` and `freqData`.
   ============================================================== */

const FFT_SIZE = 512;                 // → 256 frequency bins

// --- DOM handles -------------------------------------------------
const dropZone   = document.getElementById("drop-zone");
const fileInput  = document.getElementById("file-input");
const audioEl    = document.getElementById("audio-el");
const transport  = document.getElementById("transport");
const trackName  = document.getElementById("track-name");
const statusEl   = document.getElementById("status-readout");
const canvas     = document.getElementById("visualizer");
const ctx2d      = canvas.getContext("2d");

// --- Audio graph state (populated lazily) ------------------------
let audioCtx  = null;   // AudioContext — created on first user gesture
let analyser  = null;   // AnalyserNode — FFT provider
let freqData  = null;   // Uint8Array(frequencyBinCount) — reused every frame
let graphWired = false; // createMediaElementSource may run only ONCE per element

/**
 * Create (or resume) the AudioContext.
 * MUST be called from inside a user-gesture handler: browsers
 * autoplay-block contexts created outside one. We also call
 * resume() defensively — Safari in particular hands back a
 * context in the "suspended" state.
 */
async function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }
  return audioCtx;
}

/**
 * Wire: <audio> → AnalyserNode → destination (speakers).
 * Idempotent — the source node can only ever be created once
 * per media element, so we guard with `graphWired`.
 */
async function wireAudioGraph() {
  const ctx = await getAudioContext();
  if (graphWired) return;

  const source = ctx.createMediaElementSource(audioEl);
  analyser = ctx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.85;  // silky inter-frame easing

  // One reusable buffer — allocated once, filled every frame.
  freqData = new Uint8Array(analyser.frequencyBinCount); // 256 bins

  source.connect(analyser);
  analyser.connect(ctx.destination);
  graphWired = true;
}

/**
 * Accept a File, validate it's audio, and hand it to the
 * <audio> element via an object URL.
 */
async function loadTrack(file) {
  if (!file) return;
  if (!file.type.startsWith("audio/") && !/\.mp3$/i.test(file.name)) {
    statusEl.textContent = "FFT 512 · NOT AN AUDIO FILE";
    return;
  }

  await wireAudioGraph();   // safe: we're inside a user gesture

  // Revoke the previous object URL to avoid leaking blobs.
  if (audioEl.dataset.objectUrl) URL.revokeObjectURL(audioEl.dataset.objectUrl);
  const url = URL.createObjectURL(file);
  audioEl.dataset.objectUrl = url;
  audioEl.src = url;
  audioEl.play().catch(() => { /* user can press play manually */ });

  // UI state: landing → playing
  trackName.textContent = file.name;
  transport.classList.add("active");
  dropZone.classList.add("hidden");
  statusEl.textContent = "FFT 512 · LIVE";

  startRenderLoop();
}

// --- Upload event wiring ------------------------------------------

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    fileInput.click();
  }
});

fileInput.addEventListener("change", () => loadTrack(fileInput.files[0]));

// Drag & drop — preventDefault on dragover is required, otherwise
// the browser navigates to the dropped file.
dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("drag-over");
});
dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-over");
});
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  loadTrack(e.dataTransfer.files[0]);
});


/* ==============================================================
   SECTION 3 — RENDER LOOP
   Per frame: clear canvas → pull live FFT data into the reused
   Uint8Array → indexed for-loop → one bar per rendered bin.
   No allocations inside the loop; gradient is rebuilt only when
   the canvas height actually changes.
   ============================================================== */

let rafId = null;

// --- Render tuning ------------------------------------------------
const BAR_GAP       = 2;      // px gap between bars (CSS pixels)
const BINS_RENDERED = 180;    // crop near-silent top bins (>~15.5 kHz)
const HF_TILT       = 1.6;    // high-frequency compensation strength
const CAP_COLOR     = "#ffe9b8";  // rounded cap / hottest tip color

const reducedMotion =
  window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* --- Gradient strip (offscreen, painted ONCE) ---------------------
   Creating ~180 LinearGradients per frame would hammer the GC, so
   instead the ember→amber→luminous ramp is rendered once onto a
   1×256 offscreen canvas. Each bar is then drawn with drawImage(),
   stretching the strip to that bar's height — meaning EVERY bar
   carries the full gradient scaled to its own peak (luminous tip
   on short and tall bars alike), with zero per-frame allocations. */
const gradStrip = document.createElement("canvas");
gradStrip.width  = 1;
gradStrip.height = 256;
{
  const g    = gradStrip.getContext("2d");
  const ramp = g.createLinearGradient(0, 256, 0, 0);
  ramp.addColorStop(0.00, "#6e3f0a");   // deep ember base
  ramp.addColorStop(0.50, "#f5a623");   // phosphor amber
  ramp.addColorStop(0.85, "#ffb84d");   // neon orange
  ramp.addColorStop(1.00, CAP_COLOR);   // luminous tip
  g.fillStyle = ramp;
  g.fillRect(0, 0, 1, 256);
}

/** Match the canvas bitmap to its CSS box (DPR-aware). */
function resizeCanvasToDisplaySize() {
  const dpr = window.devicePixelRatio || 1;
  const { clientWidth: w, clientHeight: h } = canvas;
  if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels
  }
}

/**
 * Main render loop — runs once per display frame.
 * Hot path rules: no allocations, no per-frame gradient creation,
 * indexed for-loop over the reused Uint8Array.
 */
function animate() {
  rafId = requestAnimationFrame(animate);
  resizeCanvasToDisplaySize();

  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  // 1. CLEAR
  ctx2d.clearRect(0, 0, w, h);

  // No graph yet, or track paused → ambient idle pattern
  if (!analyser || audioEl.paused) {
    drawIdle(w, h);
    return;
  }

  // 2. READ — fills the preallocated buffer in place (0–255 per bin)
  analyser.getByteFrequencyData(freqData);

  // 3. ITERATE + 4. DRAW
  const n       = Math.min(BINS_RENDERED, freqData.length);
  const slotW   = w / n;                      // bar + gap
  const barW    = Math.max(1, slotW - BAR_GAP);
  const usableH = h - 10;                     // headroom at the top
  const capR    = barW / 2;

  for (let i = 0; i < n; i++) {
    const v = freqData[i] / 255;              // normalize 0..1

    /* High-frequency tilt — see explanation in chat.
       comp ramps 1.0 (bass, left) → 1+HF_TILT (treble, right)
       along a QUADRATIC curve in bin index, so mids are barely
       touched and only the naturally weak top end gets lifted. */
    const t    = i / (n - 1);
    const comp = 1 + HF_TILT * t * t;

    // v² = perceptual loudness curve; comp = spectral tilt; clamp.
    const barH = Math.min(usableH, Math.max(2, v * v * comp * usableH));
    const x    = i * slotW + BAR_GAP / 2;
    const y    = h - barH;

    // Bar body: the gradient strip stretched to THIS bar's height
    ctx2d.drawImage(gradStrip, x, y, barW, barH);

    // Rounded cap: half-disc at the tip in the hottest ramp color.
    // Skipped for near-silent stubs so the baseline stays calm.
    if (barH > capR + 3) {
      ctx2d.fillStyle = CAP_COLOR;
      ctx2d.beginPath();
      ctx2d.arc(x + capR, y, capR, Math.PI, 0);
      ctx2d.fill();
    }
  }
}

/**
 * Idle state — a slow-breathing wave of ghost bars so the panel
 * reads "powered on, waiting" before a file loads or while paused.
 * Falls back to a static baseline under prefers-reduced-motion.
 */
function drawIdle(w, h) {
  if (reducedMotion) {
    ctx2d.globalAlpha = 0.45;
    ctx2d.drawImage(gradStrip, 0, h - 3, w, 3);
    ctx2d.globalAlpha = 1;
    return;
  }

  const time  = performance.now() / 1000;
  const n     = 96;
  const slotW = w / n;
  const barW  = Math.max(1, slotW - BAR_GAP);

  ctx2d.globalAlpha = 0.4;
  for (let i = 0; i < n; i++) {
    // Two slow sines at different rates → drifting interference wave
    const phase = (i / n) * Math.PI * 3;
    const swell = Math.sin(phase + time * 0.9) * Math.sin(time * 0.35 + i * 0.07);
    const barH  = 4 + 7 * (0.5 + 0.5 * swell);
    const x     = i * slotW + BAR_GAP / 2;
    ctx2d.drawImage(gradStrip, x, h - 6 - barH, barW, barH);
  }
  ctx2d.globalAlpha = 1;
}

/** Start the loop exactly once. */
function startRenderLoop() {
  if (rafId === null) animate();
}

window.addEventListener("resize", resizeCanvasToDisplaySize);

// Boot the loop immediately: the idle wave greets the user before
// any file is loaded. (No AudioContext is touched here — that still
// waits for a user gesture.)
startRenderLoop();
</script>
</body>
</html>
